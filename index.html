<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monitor de Compras — TOTVS Protheus</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a2f42;--border2:#3a4060;
  --text:#e8eaf0;--muted:#7b82a0;--accent:#4f7cff;--accent2:#7c5cff;
  --green:#22c77a;--amber:#f5a623;--red:#f0475a;--teal:#22c2d0;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:10px;--rl:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.app{display:flex;min-height:100vh;}
.sidebar{width:238px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:transform .3s;}
.main{margin-left:238px;flex:1;display:flex;flex-direction:column;}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border);}
.logo-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.logo-title{font-size:15px;font-weight:600;}
.logo-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.nav{flex:1;padding:8px;overflow-y:auto;}
.nav-sec{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:12px 10px 4px;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--muted);margin-bottom:1px;transition:all .15s;border:none;background:none;width:100%;text-align:left;}
.ni:hover{background:var(--surface2);color:var(--text);}
.ni.active{background:rgba(79,124,255,.14);color:var(--accent);}
.ni svg{width:15px;height:15px;flex-shrink:0;}
.nb{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--border);}
.sync{font-size:11px;color:var(--muted);padding:6px 11px;display:flex;align-items:center;gap:7px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.tb-title{font-size:14px;font-weight:600;flex:1;}
.tb-sub{font-size:11px;color:var(--muted);font-weight:400;margin-left:8px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;border:none;font-family:var(--font);}
.btn-p{background:var(--accent);color:#fff;}.btn-p:hover{background:#3d6ef0;}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}.btn-g:hover{background:var(--surface2);color:var(--text);}
.btn svg{width:14px;height:14px;}
.content{flex:1;padding:22px 24px;overflow-y:auto;}
.sh{margin-bottom:18px;}
.sh-title{font-size:18px;font-weight:600;margin-bottom:3px;}
.sh-sub{font-size:12.5px;color:var(--muted);}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:11px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:15px 17px;position:relative;overflow:hidden;transition:border-color .2s;}
.kpi:hover{border-color:var(--border2);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.bl::before{background:var(--accent)}.kpi.gn::before{background:var(--green)}.kpi.am::before{background:var(--amber)}
.kpi.rd::before{background:var(--red)}.kpi.tl::before{background:var(--teal)}.kpi.pu::before{background:var(--accent2)}
.kpi-lb{font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.kpi-v{font-size:25px;font-weight:600;font-family:var(--mono);line-height:1;}
.kpi-s{font-size:11px;color:var(--muted);margin-top:4px;}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:6px;}
.tg{background:rgba(34,199,122,.15);color:var(--green)}.ta{background:rgba(245,166,35,.15);color:var(--amber)}
.tr{background:rgba(240,71,90,.15);color:var(--red)}.tb{background:rgba(79,124,255,.15);color:var(--accent)}
.tt{background:rgba(34,194,208,.15);color:var(--teal)}
/* FILTERS */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:13px;align-items:center;}
.fsel{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:var(--r);font-size:12.5px;font-family:var(--font);cursor:pointer;outline:none;}
.fsel:focus{border-color:var(--accent);}
.finp{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:var(--r);font-size:12.5px;font-family:var(--font);outline:none;min-width:220px;}
.finp:focus{border-color:var(--accent);}.finp::placeholder{color:var(--muted);}
.fcnt{margin-left:auto;font-size:11.5px;color:var(--muted);font-family:var(--mono);}
/* TABLE */
.tw{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead{background:var(--surface2);}
th{padding:10px 12px;text-align:left;font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text);}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.mn{font-family:var(--mono);font-size:11.5px;color:var(--muted);}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.bg{background:rgba(34,199,122,.13);color:var(--green);}.bg::before{background:var(--green);}
.ba{background:rgba(245,166,35,.13);color:var(--amber);}.ba::before{background:var(--amber);}
.br{background:rgba(240,71,90,.13);color:var(--red);}.br::before{background:var(--red);}
.bb{background:rgba(79,124,255,.13);color:var(--accent);}.bb::before{background:var(--accent);}
.bt{background:rgba(34,194,208,.13);color:var(--teal);}.bt::before{background:var(--teal);}
.bz{background:rgba(123,130,160,.13);color:var(--muted);}.bz::before{background:var(--muted);}
.tipo-b{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.04em;}
.te{background:rgba(79,124,255,.13);color:var(--accent);border:1px solid rgba(79,124,255,.25);}
.td{background:rgba(124,92,255,.13);color:var(--accent2);border:1px solid rgba(124,92,255,.25);}
/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-i{font-size:32px;margin-bottom:11px;opacity:.35;}
.empty-t{font-size:14px;margin-bottom:4px;font-weight:500;}
.empty-s{font-size:12px;}
/* IMPORT */
.imp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px;}
.imp-card{border:1px solid var(--border);border-radius:var(--rl);background:var(--surface);overflow:hidden;}
.imp-hdr{padding:13px 16px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.imp-hdr-t{font-size:13px;font-weight:600;}
.imp-hdr-s{font-size:11px;color:var(--muted);margin-top:1px;}
.imp-zone{padding:24px 18px;text-align:center;cursor:pointer;transition:all .2s;border:2px dashed transparent;margin:10px;border-radius:var(--r);}
.imp-zone:hover,.imp-zone.drag{border-color:var(--accent);background:rgba(79,124,255,.05);}
.imp-zi{font-size:26px;margin-bottom:9px;opacity:.4;}
.imp-zt{font-size:12px;color:var(--muted);margin-bottom:11px;}
input[type=file]{display:none;}
.imp-fields{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;}
.imp-ft{font-size:13px;font-weight:600;margin-bottom:12px;}
.imp-tabs{display:flex;gap:4px;margin-bottom:14px;}
.imp-tab{padding:5px 13px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .15s;}
.imp-tab.active{background:rgba(79,124,255,.15);color:var(--accent);border-color:rgba(79,124,255,.35);}
.fcol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px;}
.fcol{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;}
.fcol-f{font-size:11.5px;color:var(--accent);font-family:var(--mono);}
.fcol-l{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px;}
.fcol-d{font-size:10.5px;color:var(--muted);margin-top:1px;opacity:.7;}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;}
.mh{padding:16px 20px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.mh-t{font-size:14px;font-weight:600;}
.mclose{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;}
.mclose:hover{color:var(--text);}
.mb{padding:16px 20px;}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.mf{display:flex;flex-direction:column;gap:3px;}
.mf.full{grid-column:1/-1;}
.fl{font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.fv{font-size:13px;color:var(--text);}
.mfoot{padding:13px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;}
/* TOAST */
.tw-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:999;}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 15px;font-size:12.5px;display:flex;align-items:center;gap:8px;animation:sli .2s ease;min-width:240px;max-width:330px;}
.toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--accent)}
@keyframes sli{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}
/* GUIA */
.step-grid{display:flex;flex-direction:column;gap:12px;max-width:660px;}
.step{display:flex;gap:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;align-items:flex-start;}
.step-n{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.step-t{font-size:13.5px;font-weight:600;margin-bottom:4px;}
.step-d{font-size:12.5px;color:var(--muted);line-height:1.65;}
.info-box{background:rgba(79,124,255,.08);border:1px solid rgba(79,124,255,.2);border-radius:var(--rl);padding:14px 16px;margin-top:12px;max-width:660px;}
.info-box-t{font-size:12.5px;font-weight:600;color:var(--accent);margin-bottom:6px;}
.info-box-d{font-size:12px;color:var(--muted);line-height:1.65;}
/* HAMBURGER */
.hb{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:6px;}
@media(max-width:900px){.imp-grid{grid-template-columns:1fr;}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.5)}
  .main{margin-left:0}.hb{display:flex}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .filters{flex-direction:column;align-items:stretch}.finp{min-width:unset}
  .tw{overflow-x:auto}.mrow{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-label">Monitor</div>
    <div class="logo-title">Compras Protheus</div>
    <div class="logo-sub">MATA110 · MATA121 · MATR290</div>
  </div>
  <nav class="nav">
    <div class="nav-sec">Geral</div>
    <button class="ni active" onclick="nav('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </button>
    <div class="nav-sec">Compras</div>
    <button class="ni" onclick="nav('pedidos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      Pedidos SC7
      <span class="nb" id="bp">0</span>
    </button>
    <button class="ni" onclick="nav('sc')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Solicitações SC1
      <span class="nb" id="bsc">0</span>
    </button>
    <div class="nav-sec">Estoque</div>
    <button class="ni" onclick="nav('estoque')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Análise Estoque
      <span class="nb" id="be">0</span>
    </button>
    <div class="nav-sec">Dados</div>
    <button class="ni" onclick="nav('importar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Importar Planilhas
    </button>
    <button class="ni" onclick="nav('ajuda')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Guia de Uso
    </button>
  </nav>
  <div class="sb-bottom">
    <div class="sync"><span class="dot"></span>Dados locais ativos</div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <header class="topbar">
    <button class="hb" onclick="toggleSb()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="tb-title" id="ptitle">Dashboard</span>
    <div style="display:flex;gap:8px">
      <button class="btn btn-g" onclick="limpar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>Limpar
      </button>
      <button class="btn btn-p" onclick="nav('importar')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Importar
      </button>
    </div>
  </header>
  <div class="content" id="content"></div>
</div>
</div>

<!-- MODAL -->
<div class="mo" id="modal" style="display:none" onclick="closeM(event)">
  <div class="mc" id="mc"></div>
</div>
<div class="tw-wrap" id="toasts"></div>

<script>
// ═══════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════
const S = {
  pg:'dashboard',
  pc:[],   // MATA121 — SC7 — Pedidos de compra
  sc:[],   // MATA110 — SC1 — Solicitações de compra
  est:[],  // MATR290 — SB1/SB2 — Estoque
  f:{tipo:'todos',status:'todos',busca:''},
  sort:{campo:'',dir:1},
  itab:'mata121'
};

// ═══════════════════════════════════════════════
// DEMO — campos reais Protheus
// ═══════════════════════════════════════════════
function gerarDemo(){
  const forn=['AÇOS BRASIL LTDA','DISTRIB NORTE S/A','METALURGICA ABC LTDA','SUPRIMENTOS GERAIS ME','INDUSTRIAS DELTA S/A'];
  const prods=[
    {C:'AÇO001',D:'CHAPA ACO CARBONO 3MM',U:'KG'},
    {C:'PAR002',D:'PARAFUSO 1/4 INOX',U:'PC'},
    {C:'LUV003',D:'LUVA CANO 50MM PVC',U:'PC'},
    {C:'TIN004',D:'TINTA ESMALTE BRILHO 18L',U:'LT'},
    {C:'FIL005',D:'FILTRO PRENSA 20X20',U:'PC'},
    {C:'COR006',D:'CORREIA V-BELT A45',U:'PC'},
    {C:'ROL007',D:'ROLAMENTO 6205 2RS',U:'PC'},
    {C:'OLE008',D:'OLEO HIDRAULICO 20L',U:'LT'},
    {C:'VAL009',D:'VALVULA ESFERA 3/4',U:'PC'},
    {C:'FIT010',D:'FITA ISOLANTE 19MM',U:'RL'},
  ];
  const ccs=['100','200','300','400','500'];
  const stPC=['L','P','E','C',''];
  const stSC=['P','L','G','C','B'];
  for(let i=1;i<=28;i++){
    const pr=prods[i%prods.length];
    const tp=i%3===0?'S':'R';
    const st=stPC[i%stPC.length];
    const fn=forn[i%forn.length];
    const qtd=+((i*17+50)%500+10).toFixed(2);
    const pru=+((i*13+30)%400+20).toFixed(2);
    const d=new Date(2025,Math.floor(i/5),i%28+1);
    const de=new Date(d.getTime()+(15+i%30)*86400000);
    S.pc.push({
      C7_FILIAL:'01',C7_NUM:String(i).padStart(6,'0'),C7_ITEM:'001',
      C7_PRODUTO:pr.C,C7_DESCRI:pr.D,
      C7_FORNECE:fn,C7_LOJA:'01',
      C7_QUANT:qtd,C7_PRUNIT:pru,C7_TOTAL:+(qtd*pru).toFixed(2),
      C7_CC:ccs[i%5],C7_TIPO:tp,
      C7_EMISSAO:d.toLocaleDateString('pt-BR'),
      C7_DATPRF:de.toLocaleDateString('pt-BR'),
      C7_QUJE:st==='P'?+(qtd*.4).toFixed(2):st==='L'?qtd:0,
      C7_RESIDUO:st==='C'?'S':'N',
      C7_STATUS:st,
      C7_SOLICIT:String(Math.ceil(i/2)).padStart(6,'0'),
      C7_OBS:st==='P'?'Entrega parcial pendente':'',
    });
  }
  for(let i=1;i<=22;i++){
    const pr=prods[i%prods.length];
    const tp=i%4===0?'S':'R';
    const st=stSC[i%stSC.length];
    const qtd=+((i*11+5)%200+5).toFixed(2);
    const d=new Date(2025,Math.floor(i/4),i%28+1);
    const dn=new Date(d.getTime()+(10+i%20)*86400000);
    S.sc.push({
      C1_FILIAL:'01',C1_NUM:String(i).padStart(6,'0'),C1_ITEM:'001',
      C1_PRODUTO:pr.C,C1_DESCRI:pr.D,
      C1_QUANT:qtd,C1_QUJE:st==='G'?qtd:0,
      C1_CC:ccs[i%5],C1_TIPO:tp,
      C1_SOLICIT:'USUARIO '+String(i).padStart(2,'0'),
      C1_EMISSAO:d.toLocaleDateString('pt-BR'),
      C1_DATPRF:dn.toLocaleDateString('pt-BR'),
      C1_APROV:st==='L'||st==='G'?'L':'B',
      C1_PEDIDO:st==='G'?String(Math.ceil(i/2)).padStart(6,'0'):'',
      C1_STATUS:st,C1_OBS:'',
    });
  }
  prods.forEach((pr,i)=>{
    const qatu=+((i*77+100)%1000+50).toFixed(2);
    const emp=+(qatu*.25).toFixed(2);
    const sped=+(qatu*.3).toFixed(2);
    const cm=+((i*31+15)%300+10).toFixed(2);
    S.est.push({
      B1_COD:pr.C,B1_DESC:pr.D,B1_UM:pr.U,B1_TIPO:'PA',
      B2_LOCAL:'01',
      B2_QATU:qatu,B2_EMPENHO:emp,B2_SALPEDI:sped,
      B2_CM1:cm,B2_VATU1:+(qatu*cm).toFixed(2),
      DISPONIVEL:+(qatu-emp).toFixed(2),
    });
  });
  updBadges();
}

function updBadges(){
  document.getElementById('bp').textContent=S.pc.length;
  document.getElementById('bsc').textContent=S.sc.length;
  document.getElementById('be').textContent=S.est.length;
}

function nav(pg){
  S.pg=pg;

    (TITLES[pg]||pg)+(SUBS[pg]?` <span class="tb-sub">${SUBS[pg]}</span>`:'');

  else if(S.pg==='pedidos') c.innerHTML=rPC();
  else if(S.pg==='sc') c.innerHTML=rSC();
  else if(S.pg==='estoque') c.innerHTML=rEst();
  else if(S.pg==='importar') c.innerHTML=rImp();
  else if(S.pg==='ajuda') c.innerHTML=rAjuda();

}

  const tb=document.getElementById('tbody-main');
  const cnt=document.getElementById('filter-count');

  if(S.pg==='pedidos'){

function getFPC(){
  let d=[...S.pc];
  if(S.f.filial&&S.f.filial!=='todos') d=d.filter(x=>x.C7_FILIAL===S.f.filial);
  if(S.f.tipo!=='todos') d=d.filter(x=>S.f.tipo==='R'?x.C7_TIPO!=='S':x.C7_TIPO==='S');
  if(S.f.status!=='todos') d=d.filter(x=>x.C7_STATUS===S.f.status);
  if(S.f.busca){const b=S.f.busca.toLowerCase();d=d.filter(x=>JSON.stringify(x).toLowerCase().includes(b));}
  if(S.sort.campo) d.sort((a,b)=>{
    const av=a[S.sort.campo],bv=b[S.sort.campo];
    const dc=['C7_EMISSAO','C7_DATPRF'];
    if(dc.includes(S.sort.campo))return(dataOrd(av)-dataOrd(bv))*S.sort.dir;
    return(isNaN(av)||isNaN(bv)?String(av||'').localeCompare(String(bv||''),'pt'):(+av)-(+bv))*S.sort.dir;
  });
  return d;
}

// ESTOQUE MATR290
// ═══════════════════════════════════════════════
function getFEst(){
  let d=[...S.est];
  if(S.f.busca){const b=S.f.busca.toLowerCase();d=d.filter(x=>JSON.stringify(x).toLowerCase().includes(b));}
  if(S.f.filial&&S.f.filial!=='todos') d=d.filter(x=>x.B1_FILIAL===S.f.filial);
  if(S.f.status==='critico') d=d.filter(x=>(+x.DISPONIVEL||0)<=0);
  else if(S.f.status==='baixo') d=d.filter(x=>(+x.DISPONIVEL||0)>0&&(+x.DISPONIVEL||0)<=(+x.B2_QATU||0)*.2);
  if(S.sort.campo) d.sort((a,b)=>{const av=a[S.sort.campo],bv=b[S.sort.campo];return(isNaN(av)||isNaN(bv)?String(av||'').localeCompare(String(bv||''),'pt'):(+av)-(+bv))*S.sort.dir;});
  return d;
}

  if(!d.length) return `<tr><td colspan="11"><div class="empty"><div class="empty-i">📦</div><div class="empty-t">Nenhum produto encontrado</div><div class="empty-s">Ajuste os filtros ou importe MATR290</div></div></td></tr>`;
  return d.map(r=>{
    const disp=+r.DISPONIVEL||0,qatu=+r.B2_QATU||0;
    const pct=qatu>0?disp/qatu:0;
    const [sit,sc]=disp<=0?['Crítico','br']:pct<.2?['Baixo','ba']:['Normal','bg'];
    return`<tr>
      <td class="mn" style="font-size:11px">${r.B1_FILIAL||''}</td>
      <td class="mn">${r.B1_COD}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px" title="${r.B1_DESC}">${r.B1_DESC}</td>

/* Lê todas as abas relevantes do workbook Protheus, pulando linha de título automaticamente.
   O MATR290 exporta uma aba por empresa/filial — todas são consolidadas aqui. */
function lerAbasProtheus(wb){
  const abas = wb.SheetNames.filter(n => n.toLowerCase() !== 'parametros');
  let todos = [];
  abas.forEach(function(nome){
    const ws = wb.Sheets[nome];
    /* sheet_to_json com header:1 retorna array de arrays */
    const arr = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:false});
    if(!arr || arr.length < 2) return;
    /* Detectar linha de cabeçalho: é a primeira linha com mais de 2 células preenchidas */
    let hdrIdx = 0;
    for(let i = 0; i < Math.min(arr.length, 4); i++){
      const filled = arr[i].filter(function(c){ return c !== '' && c !== null && c !== undefined; }).length;
      if(filled > 2){ hdrIdx = i; break; }
    }
    const hdrs = arr[hdrIdx].map(function(h){ return String(h||'').trim().replace(/\r\n|\r|\n/g,' '); });
    /* Converter linhas de dados em objetos */
    for(let i = hdrIdx + 1; i < arr.length; i++){
      const row = arr[i];
      if(row.every(function(c){ return c === '' || c === null || c === undefined; })) continue;
      const obj = {};
      hdrs.forEach(function(h, j){ obj[h] = row[j] !== undefined ? row[j] : ''; });
      obj['__aba__'] = nome;
      todos.push(obj);
    }
  });
  return todos;
}

function procFileObj(file,tipo){
  const rd=new FileReader();
  rd.onload=function(e){
    try{
      let rows=[];
      if(file.name.toLowerCase().endsWith('.csv')){
        const txt=e.target.result;
        const lines=txt.split(/\r?\n/).filter(function(l){ return l.trim(); });
        const sep=lines[0].split(';').length>lines[0].split(',').length?';':',';
        /* Detectar se linha 0 é título (poucas colunas preenchidas) */
        const l0cells = lines[0].split(sep).filter(function(c){ return c.trim(); }).length;
        const hdrLine = l0cells <= 2 ? 1 : 0;
        const hdrs=lines[hdrLine].split(sep).map(function(h){ return h.trim().replace(/["']/g,''); });
        for(let i=hdrLine+1;i<lines.length;i++){
          const vals=lines[i].split(sep).map(function(v){ return v.trim().replace(/["']/g,''); });
          const o={};hdrs.forEach(function(h,j){ o[h]=vals[j]||''; });rows.push(o);
        }
      } else {
        /* cellDates:false para receber datas como string formatada pelo raw:false em lerAbasProtheus */
        const wb=XLSX.read(e.target.result,{type:'array', cellDates:false});
        rows = lerAbasProtheus(wb);
      }
      if(!rows.length){toast('Arquivo vazio ou formato não reconhecido','error');return;}
      if(tipo==='pc') impPC(rows);
      else if(tipo==='sc') impSC(rows);
      else impEst(rows);
    }catch(err){toast('Erro ao ler arquivo: '+err.message,'error');console.error(err);}
  };
  if(file.name.toLowerCase().endsWith('.csv')) rd.readAsText(file,'windows-1252');
  else rd.readAsArrayBuffer(file);
}

/* Converte datas do Protheus: serial Excel, string AAAAMMDD, DD/MM/YYYY, MM/DD/YYYY (SheetJS), ISO */
function fmtData(v){
  if(!v||v===''||v==='0'||v===0)return'';
  const s=String(v).trim();
  /* SheetJS com raw:false formata como MM/DD/YYYY — detectar e converter para DD/MM/YYYY */
  const sl=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(sl){
    const a=parseInt(sl[1]),b=parseInt(sl[2]),y=parseInt(sl[3]);
    /* Se primeiro campo > 12, já está DD/MM/YYYY */
    if(a>12) return String(a).padStart(2,'0')+'/'+String(b).padStart(2,'0')+'/'+y;
    /* SheetJS retorna MM/DD/YYYY → inverter */
    return String(b).padStart(2,'0')+'/'+String(a).padStart(2,'0')+'/'+y;
  }
  /* Serial Excel numérico */
  const n=parseFloat(s.replace(',','.'));
  if(!isNaN(n)&&n>10000&&n<60000){
    const d=new Date(Math.round((n-25569)*86400000));
    return d.toLocaleDateString('pt-BR');
  }
  /* Formato AAAAMMDD */
  if(/^\d{8}$/.test(s)){
    return s.slice(6,8)+'/'+s.slice(4,6)+'/'+s.slice(0,4);
  }
  /* ISO AAAA-MM-DD */
  const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return iso[3]+'/'+iso[2]+'/'+iso[1];
  return s;
}
/* Converte data para valor comparável (para ordenação correta) */
function dataOrd(v){
  if(!v)return 0;
  const m=String(v).match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if(m)return parseInt(m[3]+m[2]+m[1]);
  return 0;
}
function mp(obj,...cs){
  const keys=Object.keys(obj);
  for(const c of cs){
    const k=keys.find(k=>k.trim().toLowerCase()===c.toLowerCase());
    if(k) return String(obj[k]||'').trim();
  }
  for(const c of cs){
    const k=keys.find(k=>k.toLowerCase().replace(/[^a-z0-9]/g,'').includes(c.toLowerCase().replace(/[^a-z0-9]/g,'')));
    if(k) return String(obj[k]||'').trim();
  }
  return '';
}
function nTipo(v,um=''){const s=String(v).toUpperCase();const u=String(um).toUpperCase().trim();if(u==='SV')return'S';return(s==='S'||s.includes('DIRETO')||s.includes('SERVICO'))?'S':'R';}
function nStPC(v,quje,qtd){const s=String(v).toUpperCase();if(s==='L'||s.includes('LIBER'))return'L';if(s==='A'||s.includes('APROV'))return'A';if(s==='C'||s.includes('CANCEL'))return'C';if(s==='P'||s.includes('PARCI'))return'P';/* Se não vier status, inferir por qtd entregue */if(!v&&qtd>0){if(quje<=0)return'';if(quje>=qtd)return'L';return'P';}return '';}
function nStSC(v,quantPed,quant){const s=String(v).toUpperCase();if(s==='L'||s.includes('LIBER'))return'L';if(s==='G'||s.includes('GERO')||s.includes('PEDIDO'))return'G';if(s==='C'||s.includes('CANCEL'))return'C';if(s==='B'||s.includes('BLOQ'))return'B';if(s==='R'||s.includes('REJEIT'))return'R';/* Se não vier status, inferir: Quant.em Ped > 0 = gerou pedido */if(!v&&quantPed>0)return'G';return'P';}
function nNum(v){if(v===null||v===undefined||v==='')return 0;if(typeof v==='number')return+v.toFixed(4)*1||0;return+(String(v).replace(',','.').replace(/[^\d.-]/g,''))||0;}

function impPC(rows){
  const n=rows.map((r,i)=>{
    /* Filial: "020102-TGM - FILIAL BARRO ALTO" → pegar só o código antes do hífen */
    const filialRaw=mp(r,'C7_FILIAL','Filial','filial')||'';
    const filial=filialRaw.split('-')[0].trim()||'01';
    const um=mp(r,'Unidade','Unid Medida','C7_UM','um','unidade');
    const quant=nNum(mp(r,'C7_QUANT','Quantidade','quantidade','qtd','qty'));
    const prunit=nNum(mp(r,'C7_PRUNIT','Prc Unitario','preco unitario','prunit','valor unitario'));
    const quje=nNum(mp(r,'C7_QUJE','Qtd.Entregue','qtd entregue','quje','entregue'));
    const statusRaw=mp(r,'C7_STATUS','status','situacao');
    return{
      C7_FILIAL:filial,
      C7_FILIAL_DESC:filialRaw,
      C7_NUM:mp(r,'C7_NUM','Numero','numero','num')||String(S.pc.length+i+1).padStart(6,'0'),
      C7_ITEM:mp(r,'C7_ITEM','Item da SC','item')||String(i+1).padStart(3,'0'),
      C7_PRODUTO:mp(r,'C7_PRODUTO','Produto','produto','codigo produto'),
      C7_DESCRI:mp(r,'C7_DESCRI','Descricao','descricao','descri','desc'),
      /* Fornecedor no export real = CNPJ. Exibir como código do fornecedor */
      C7_FORNECE:mp(r,'C7_FORNECE','Fornecedor','fornecedor','fornece','cnpj fornecedor'),
      C7_LOJA:mp(r,'C7_LOJA','loja')||'01',
      C7_UM:um,
      C7_QUANT:quant,
      C7_PRUNIT:prunit,
      /* C7_TOTAL calculado por item pois export não traz coluna Total */
      C7_TOTAL:+(quant*prunit).toFixed(2),
      C7_CC:mp(r,'C7_CC','Centro Custo','centro custo','centro de custo','cc'),
      C7_CLASSEVALOR:mp(r,'Classe Valor','classe valor','C7_CC2'),
      /* C7_TIPO deduzido pela Unidade: SV = Serviço/Uso Direto */
      C7_TIPO:nTipo(mp(r,'C7_TIPO','tipo'),um),
      C7_EMISSAO:fmtData(mp(r,'C7_EMISSAO','Data Emissao','data emissao','emissao','data')),
      C7_DATPRF:fmtData(mp(r,'C7_DATPRF','Dt. Entrega','datprf','previsao entrega','entrega','dt entrega')),
      C7_QUJE:quje,
      C7_RESIDUO:'N',
      C7_STATUS:nStPC(statusRaw,quje,quant),
      /* Numero da SC = SC de origem vinculada ao pedido */
      C7_SOLICIT:mp(r,'C7_SOLICIT','Numero da SC','numero da sc','sc vinculada','solicit'),
      C7_OBS:mp(r,'C7_OBS','obs','observacao'),
    };
  });
  /* Upsert por chave: C7_FILIAL+C7_NUM+C7_PRODUTO evita duplicatas na reimportação */
  const chave=x=>x.C7_FILIAL+'|'+x.C7_NUM+'|'+x.C7_PRODUTO;
  const idx=new Map(S.pc.map(x=>[chave(x),x]));
  n.forEach(x=>idx.set(chave(x),x));
  S.pc=[...idx.values()];
  updBadges();salvar();
  toast(`✅ ${n.length} linhas MATA121 importadas (${S.pc.length} total sem duplicatas)!`,'success');
  setTimeout(()=>nav('pedidos'),700);
}

function impSC(rows){
  const n=rows.map((r,i)=>{
    /* Filial: "020102-TGM - FILIAL BARRO ALTO" → código antes do hífen */
    const filialRaw=mp(r,'C1_FILIAL','Filial','filial')||'';
    const filial=filialRaw.split('-')[0].trim()||'01';
    const um=mp(r,'Unid Medida','C1_UM','unidade','um');
    const quant=nNum(mp(r,'C1_QUANT','Quantidade','quantidade','qtd','qty'));
    const quantPed=nNum(mp(r,'Quant.em Ped','quant em ped','quant.em ped','qtd em pedido','C1_QUJE'));
    const statusRaw=mp(r,'C1_STATUS','status','situacao');
    return{
      C1_FILIAL:filial,
      C1_FILIAL_DESC:filialRaw,
      C1_NUM:mp(r,'C1_NUM','Numero da SC','numero da sc','numero','num')||String(S.sc.length+i+1).padStart(6,'0'),
      C1_ITEM:mp(r,'C1_ITEM','Item da SC','item da sc','item')||String(i+1).padStart(4,'0'),
      C1_PRODUTO:mp(r,'C1_PRODUTO','Produto','produto','codigo produto'),
      C1_DESCRI:mp(r,'C1_DESCRI','Descricao','descricao','descri','desc'),
      C1_QUANT:quant,
      /* Quant.em Ped = quantidade que já gerou pedido de compra */
      C1_QUJE:quantPed,
      C1_UM:um,
      C1_CC:mp(r,'C1_CC','Centro Custo','centro custo','centro de custo','cc'),
      C1_CLASSEVALOR:mp(r,'Classe Valor','classe valor'),
      C1_GRUPO:mp(r,'Grupo','grupo','C1_GRUPO'),
      C1_VALOREST:nNum(mp(r,'Valor Estim.','valor estim','valor estimado','C1_VALOREST')),
      /* C1_TIPO deduzido por Unid Medida = SV */
      C1_TIPO:nTipo(mp(r,'C1_TIPO','tipo'),um),
      C1_SOLICIT:mp(r,'C1_SOLICIT','solicitante','solicit','requester','usuario'),
      C1_EMISSAO:fmtData(mp(r,'C1_EMISSAO','DT Emissao','dt emissao','emissao','data emissao','data')),
      C1_DATPRF:mp(r,'C1_DATPRF','datprf','necessidade','data necessidade','previsao'),
      C1_APROV:mp(r,'C1_APROV','aprovacao','aprov')||'',
      C1_PEDIDO:mp(r,'C1_PEDIDO','pedido gerado','pedido','numpc'),
      /* Status deduzido por Quant.em Ped quando não há coluna Status */
      C1_STATUS:nStSC(statusRaw,quantPed,quant),
      C1_OBS:mp(r,'C1_OBS','obs','observacao'),
    };
  });
  /* Upsert por chave: filial+numero+item+produto */
  const chave=x=>x.C1_FILIAL+'|'+x.C1_NUM+'|'+x.C1_ITEM+'|'+x.C1_PRODUTO;
  const idx=new Map(S.sc.map(x=>[chave(x),x]));
  n.forEach(x=>idx.set(chave(x),x));
  S.sc=[...idx.values()];
  updBadges();salvar();
  toast(`✅ ${n.length} linhas MATA110 importadas (${S.sc.length} total sem duplicatas)!`,'success');
  setTimeout(()=>nav('sc'),700);
}


function impEst(rows){
  /* MATR290 colunas reais: Filial, Codigo, Descricao, Tp, Grupo, UM,
     Saldo Atual, Empenho, SCs Colocadas, PCs Colocados, Med. Consumo
     A aba é usada para identificar a empresa/filial */
  const n=rows.map(function(r,i){
    /* Filial: campo "Filial" ou código da aba (__aba__) */
    const filialRaw=mp(r,'Filial','filial','C1_FILIAL','B2_FILIAL')||String(r['__aba__']||'');
    const filial=filialRaw.split('-')[0].trim()||'01';
    const qatu=nNum(mp(r,'Saldo Atual','B2_QATU','qatu','saldo','quantidade atual','saldoatual'));
    const emp=nNum(mp(r,'Empenho','B2_EMPENHO','empenho','empenhado','reservado'));
    const salpedi=nNum(mp(r,'PCs Colocados','SCs Colocadas','B2_SALPEDI','salpedi','saldo pedido','pcs colocados','scs colocadas','em pedido'));
    return{
      B1_FILIAL:filial,
      B1_FILIAL_DESC:filialRaw,
      B1_COD:mp(r,'Codigo','B1_COD','codigo','cod','code','produto')||'PROD'+String(S.est.length+i+1).padStart(4,'0'),
      B1_DESC:mp(r,'Descricao','B1_DESC','descricao','desc','description'),
      B1_UM:mp(r,'UM','B1_UM','um','unidade','unidade medida')||'UN',
      B1_TIPO:mp(r,'Tp','B1_TIPO','tipo','type')||'MC',
      B1_GRUPO:mp(r,'Grupo','grupo','B1_GRUPO'),
      B2_LOCAL:mp(r,'B2_LOCAL','local','armazem','arm')||'01',
      B2_QATU:qatu,
      B2_EMPENHO:emp,
      B2_SALPEDI:salpedi,
      B2_CM1:nNum(mp(r,'B2_CM1','cm1','custo medio','custo medio unitario')),
      B2_VATU1:nNum(mp(r,'B2_VATU1','vatu1','valor atual','valor estoque')),
      MED_CONSUMO:nNum(mp(r,'Med. Consumo','medconsumo','consumo medio','med consumo')),
      DISPONIVEL:+(qatu-emp).toFixed(2),
    };
  });
  /* Upsert por chave: filial+codigo para não duplicar na reimportação */
  const chave=function(x){ return x.B1_FILIAL+'|'+x.B1_COD; };
  const idx=new Map(S.est.map(function(x){ return [chave(x),x]; }));
  n.forEach(function(x){ idx.set(chave(x),x); });
  S.est=[...idx.values()];
  updBadges();salvar();
  toast('✅ '+n.length+' produtos MATR290 importados ('+S.est.length+' total sem duplicatas)!','success');
  setTimeout(function(){ nav('estoque'); },700);
}

// ═══════════════════════════════════════════════
// PERSISTÊNCIA
// ═══════════════════════════════════════════════
function salvar(){
  try{localStorage.setItem('mcp_pc',JSON.stringify(S.pc));localStorage.setItem('mcp_sc',JSON.stringify(S.sc));localStorage.setItem('mcp_est',JSON.stringify(S.est));}catch(e){}
}
function carregar(){
  try{
    const p=localStorage.getItem('mcp_pc'),s=localStorage.getItem('mcp_sc'),e=localStorage.getItem('mcp_est');
    if(p)S.pc=JSON.parse(p);if(s)S.sc=JSON.parse(s);if(e)S.est=JSON.parse(e);
  }catch(e){}
}
function limpar(){
  if(!confirm('Limpar todos os dados e recarregar demonstração?'))return;
  S.pc=[];S.sc=[];S.est=[];
  ['mcp_pc','mcp_sc','mcp_est'].forEach(k=>localStorage.removeItem(k));
  render();toast('Dados limpos com sucesso.','info');
}

// ═══════════════════════════════════════════════
// UTILITÁRIOS
// ═══════════════════════════════════════════════
function so(campo){if(S.sort.campo===campo)S.sort.dir*=-1;else{S.sort.campo=campo;S.sort.dir=1;}render();}
function toast(msg,tipo='info'){
  const w=document.getElementById('toasts');
  const t=document.createElement('div');t.className=`toast ${tipo}`;t.textContent=msg;
  w.appendChild(t);setTimeout(()=>t.remove(),3500);
}
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');}
function bindDrop(){
  document.querySelectorAll('.imp-zone').forEach(z=>{
    z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag');});
    z.addEventListener('dragleave',()=>z.classList.remove('drag'));
  });
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
carregar();
if(!S.pc.length&&!S.sc.length&&!S.est.length)gerarDemo();
updBadges();
render();
</script>
